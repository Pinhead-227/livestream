<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Location & Video Dashboard</title>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        header {
            background-color: #2d2d2d;
            padding: 10px 20px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            border-bottom: 2px solid #3d3d3d;
        }
        .dashboard-container {
            display: grid;
            grid-template-columns: 1fr;
            flex-grow: 1;
            gap: 15px;
            padding: 15px;
            height: calc(100vh - 50px);
        }
        .dashboard-container.live-active {
            grid-template-columns: 1fr 1fr;
        }
        .panel {
            background-color: #252525;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        #map-panel { display: none; }

        .panel-header {
            background-color: #333333;
            padding: 8px 15px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #444444;
        }

        .video-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            flex-grow: 1;
        }

        .video-wrapper {
            width: 100%;
            height: 100%;
            display: none;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            flex-grow: 1;
        }

        #urlPrompt {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #111;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 20;
            padding: 20px;
            text-align: center;
        }

        #urlPrompt input {
            width: 80%;
            padding: 10px;
            border-radius: 6px;
            border: none;
            margin-top: 10px;
            font-size: 1rem;
        }

        #urlPrompt button {
            margin-top: 15px;
            padding: 10px 20px;
            font-size: 1rem;
            border: none;
            border-radius: 6px;
            background: #1877f2;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="fb-root"></div>
    <script async defer crossorigin="anonymous"
        src="https://connect.facebook.net/en_US/sdk.js"></script>

    <header>Live Location & Video Dashboard</header>

    <div id="dashboard" class="dashboard-container">

        <!-- Traccar Live GPS Panel -->
        <div id="map-panel" class="panel">
            <div class="panel-header">� Live GPS Location (Traccar)</div>
            <iframe src="https://demo4.traccar.org/?deviceId=28835839"></iframe>
        </div>

        <!-- Video Panel -->
        <div class="panel">
            <div class="panel-header">� Facebook Livestream</div>

            <div class="video-container">

                <!-- URL Prompt -->
                <div id="urlPrompt">
                    <h2>Paste your Facebook livestream URL</h2>
                    <p style="color:#aaa; margin-top:8px;">
                        Example: https://www.facebook.com/yourname/videos/123456789012345/
                    </p>
                    <input id="streamURL" type="text" placeholder="Paste livestream URL here">
                    <button onclick="loadStream()">Load Stream</button>
                </div>

                <!-- Video -->
                <div id="video-content" class="video-wrapper">
                    <div class="fb-video"
                        id="fb-live-video"
                        data-width="auto"
                        data-show-text="false"
                        data-autoplay="true"
                        data-allowfullscreen="true">
                    </div>
                </div>

            </div>
        </div>
    </div>

<script>
function loadStream() {
    const url = document.getElementById("streamURL").value.trim();
    if (!url.includes("facebook.com")) return alert("Please paste a valid Facebook video URL.");

    // Set embed target
    const embed = document.getElementById("fb-live-video");
    embed.setAttribute("data-href", url);

    // Hide prompt, show video
    document.getElementById("urlPrompt").style.display = "none";
    document.getElementById("video-content").style.display = "block";

    // Show Traccar map + split layout
    document.getElementById("map-panel").style.display = "flex";
    document.getElementById("dashboard").classList.add("live-active");

    // Render FB embed
    if (window.FB) FB.XFBML.parse();
}

window.fbAsyncInit = function() {
    FB.init({ xfbml: true, version: 'v18.0' });
};
</script>

</body>
</html>
