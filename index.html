<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Location & Video Dashboard</title>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        header {
            background-color: #2d2d2d;
            padding: 10px 20px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            border-bottom: 2px solid #3d3d3d;
        }
        .dashboard-container {
            display: grid;
            grid-template-columns: 1fr;
            flex-grow: 1;
            gap: 15px;
            padding: 15px;
            height: calc(100vh - 50px);
        }
        .dashboard-container.live-active {
            grid-template-columns: 1fr 1fr;
        }
        .panel {
            background-color: #252525;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            position: relative;
        }
        #map-panel { display: none; }

        .panel-header {
            background-color: #333333;
            padding: 8px 15px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #444444;
        }

        .video-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            flex-grow: 1;
        }

        .video-error-msg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            background-color: #151515;
            z-index: 10;
        }

        .spinner {
            border: 4px solid rgba(255,255,255,0.1);
            width: 40px; height: 40px;
            border-radius: 50%;
            border-left-color: #1877f2;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .video-wrapper {
            width: 100%;
            height: 100%;
            display: none;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            flex-grow: 1;
        }

        @media (max-width: 768px) {
            .dashboard-container.live-active {
                grid-template-columns: 1fr;
                grid-template-rows: 1fr 1fr;
                overflow-y: auto;
            }
        }
    </style>
</head>
<body>

    <div id="fb-root"></div>
    <script async defer crossorigin="anonymous"
        src="https://connect.facebook.net/en_US/sdk.js"></script>

    <header>Live Location & Video Dashboard</header>

    <div id="dashboard" class="dashboard-container">

        <!-- Map Panel (Hidden until livestream starts) -->
        <div id="map-panel" class="panel">
            <div class="panel-header">� Shared Location</div>
            <iframe src="YOUR_GOOGLE_MY_MAPS_EMBED_URL"></iframe>
        </div>

        <!-- Video Panel -->
        <div class="panel">
            <div class="panel-header">� Facebook Livestream</div>

            <div class="video-container">

                <!-- Waiting Screen -->
                <div id="stream-status" class="video-error-msg">
                    <div class="spinner"></div>
                    <h3>Waiting for livestream…</h3>
                    <p style="color:#aaa; font-size:0.9rem; margin-top:8px;">
                        Checking automatically every minute.
                    </p>
                </div>

                <!-- Video -->
                <div id="video-content" class="video-wrapper">
                    <div class="fb-video"
                        id="fb-live-video"
                        data-width="auto"
                        data-show-text="false"
                        data-autoplay="true"
                        data-allowfullscreen="true">
                    </div>
                </div>

            </div>
        </div>
    </div>

<script>
/* ---------------------------------------------------------
   AUTO-DETECT FACEBOOK LIVESTREAM
   --------------------------------------------------------- */

const PAGE_ID = "djptacek";  // Your Facebook username/page
const CHECK_INTERVAL = 60000; // 1 minute

async function checkLiveStatus() {
    try {
        const response = await fetch(`https://graph.facebook.com/${PAGE_ID}/live_videos?fields=status,embed_html&access_token=`);
        
        // NOTE: No token required for public pages, FB returns limited fields
        const data = await response.json();

        if (!data.data || data.data.length === 0) {
            retry();
            return;
        }

        const liveVideo = data.data.find(v => v.status === "LIVE");

        if (!liveVideo) {
            retry();
            return;
        }

        // SUCCESS — livestream is active
        activateLiveStream(liveVideo.embed_html);

    } catch (err) {
        retry();
    }
}

function retry() {
    document.getElementById("stream-status").innerHTML = `
        <div class="spinner"></div>
        <h3>Livestream Offline</h3>
        <p style='color:#aaa; margin-top:8px;'>Retrying every minute…</p>
    `;
    setTimeout(checkLiveStatus, CHECK_INTERVAL);
}

function activateLiveStream(embedHTML) {
    // Stop retry loop
    document.getElementById("stream-status").style.display = "none";

    // Insert Facebook embed HTML
    document.getElementById("fb-live-video").innerHTML = embedHTML;

    // Show video
    document.getElementById("video-content").style.display = "block";

    // Show map + split layout
    document.getElementById("map-panel").style.display = "flex";
    document.getElementById("dashboard").classList.add("live-active");

    // Parse FB embed
    if (window.FB) FB.XFBML.parse();
}

// Start checking immediately
checkLiveStatus();
</script>

</body>
</html>
